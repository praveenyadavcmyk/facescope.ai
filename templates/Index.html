<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FakeScope</title>
    <link rel="stylesheet" href="/static/Style.css">
</head>
<body>

<div class="container">

    <h1>📰 FakeScope</h1>
    <h2>AI-Powered News Analysis</h2>

    <p>Can you trust what you read?</p>

    <textarea
        id="newsInput"
        rows="10"
        cols="60"
        placeholder="Paste full news article here..."
    ></textarea>

    <p id="charCount">0 / 10,000</p>

    <br>

    <button id="analyzeBtn">
        Analyze Article →
    </button>

    <br><br>

    <div id="loadingContainer"></div>

    <div id="resultContainer">
        <h2 id="result"></h2>

        <div id="verdictBadge"></div>
        <div id="verdictIcon"></div>
        <div id="verdictText"></div>

        <div id="confidenceValue"></div>

        <div style="width:100%; background:#ddd; height:20px;">
            <div id="confidenceFill" style="height:20px; width:0%;"></div>
        </div>
    </div>

    <div id="errorContainer">
        <p id="errorMsg"></p>
    </div>

    <br>

    <button id="reanalyzeBtn">Analyze Again</button>
    <button id="clearBtn">Clear</button>

</div>

<script src="/static/Main.js"></script>

</body>
</html>
